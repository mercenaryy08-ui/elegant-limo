<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO meta tags for booking.elegant-limo.ch -->
    <title>Book Limousine in Zurich &amp; Switzerland | Elegant Limo</title>
    <meta
      name="description"
      content="Book your private limousine in Zurich and across Switzerland in under 60 seconds. Fixed prices, professional chauffeurs, and premium Mercedes fleet for airport, city, and ski transfers."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://booking.elegant-limo.ch/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Book Limousine in Zurich &amp; Switzerland | Elegant Limo" />
    <meta
      property="og:description"
      content="Instant online limousine booking in Zurich and all major Swiss destinations. Mercedes E-Class, EQS, and V-Class with professional chauffeurs."
    />
    <meta property="og:url" content="https://booking.elegant-limo.ch/" />
    <meta property="og:image" content="https://booking.elegant-limo.ch/images/logoelegantlimo.png" />
    <meta property="og:locale" content="en_CH" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Book Limousine in Zurich &amp; Switzerland | Elegant Limo" />
    <meta
      name="twitter:description"
      content="Premium Swiss limousine service with instant online booking. Zurich airport, city, and ski transfers."
    />
    <meta name="twitter:image" content="https://booking.elegant-limo.ch/images/logoelegantlimo.png" />

    <!-- LocalBusiness structured data for Swiss limousine service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Elegant Limo",
        "image": "https://booking.elegant-limo.ch/images/logoelegantlimo.png",
        "url": "https://booking.elegant-limo.ch/",
        "telephone": "+41 78 749 50 05",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Zurich",
          "addressCountry": "CH"
        },
        "areaServed": [
          {
            "@type": "City",
            "name": "Zurich"
          },
          {
            "@type": "Country",
            "name": "Switzerland"
          }
        ],
        "priceRange": "$$$",
        "servesCuisine": "N/A",
        "description": "Premium limousine and chauffeur service for airport, city, and ski transfers in Zurich and across Switzerland.",
        "sameAs": [
          "https://elegant-limo.ch"
        ]
      }
    </script>
  </head>
  <body>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('elegant_limo_theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
